<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hydro-js memory benchmark</title>
    <script type="module">
      import { runScenarios, formatReport } from "../dist/benchmark.js";

      const params = new URLSearchParams(location.search);
      const iterations = params.has("iterations")
        ? Number(params.get("iterations"))
        : 1500;

      (async () => {
        if (typeof window.gc !== "function") {
          throw new Error(
            "window.gc is unavailable. Launch Chromium with " +
              "--js-flags=--expose-gc.",
          );
        }

        const heap = performance.memory
          ? () => performance.memory.usedJSHeapSize
          : undefined;
        const report = await runScenarios({
          gc: () => window.gc(),
          heap,
          N: iterations,
        });
        console.log("MEMORY_REPORT_TEXT:" + formatReport(report));
        console.log("MEMORY_REPORT_JSON:" + JSON.stringify(report));
      })()
        .catch((error) => {
          console.error(
            "MEMORY_REPORT_ERROR:" + (error?.stack || String(error)),
          );
        })
        .finally(() => {
          window.__memoryDone = true;
        });
    </script>
  </head>
  <body></body>
</html>
